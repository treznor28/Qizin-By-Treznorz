<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qizin by Treznor | 3D E‑commerce</title>
  <!-- Google Fonts & basic icons via Font Awesome (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ----- RESET & VENUS GRADIENT BASE ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Space Grotesk', sans-serif;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      background: radial-gradient(circle at top left, #f5e0b5, #d4a5a5, #b5829e, #7d6d9c, #3a3b5a);
      background-blend-mode: overlay;
      color: #fff;
      scroll-behavior: smooth;
    }

    /* VENUS GRADIENT (dynamic overlay) */
    .venus-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 30%, #ffd9b0, #e7b5ac, #c58fad, #936b9c, #4e426d);
      opacity: 0.85;
      z-index: -2;
      pointer-events: none;
    }

    /* 3D canvas container */
    #three-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none; /* allow interaction with UI */
    }

    /* main content wrapper */
    .site-wrapper {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(2px);
    }

    /* ----- HEADER (transparent, stylish) ----- */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 2.5rem;
      background: rgba(10, 5, 20, 0.25);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(255, 215, 200, 0.3);
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.4);
    }

    .logo h1 {
      font-size: 2.2rem;
      font-weight: 600;
      background: linear-gradient(135deg, #f9e6cf, #f9c9c0, #e2b0d2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      text-shadow: 0 0 20px rgba(255,200,200,0.3);
    }
    .logo span {
      font-size: 1rem;
      font-weight: 300;
      margin-left: 8px;
      color: #ffdbb5;
    }

    .nav-icons {
      display: flex;
      gap: 1.8rem;
      align-items: center;
    }
    .nav-icons i {
      font-size: 1.6rem;
      color: #fff1e0;
      cursor: pointer;
      transition: 0.2s;
      filter: drop-shadow(0 0 8px #b58f9f);
    }
    .nav-icons i:hover {
      transform: scale(1.15);
      color: #ffeac5;
    }
    .search-wrapper {
      position: relative;
    }
    .search-wrapper input {
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      border: none;
      background: rgba(255,240,230,0.2);
      backdrop-filter: blur(10px);
      color: white;
      font-size: 1rem;
      width: 200px;
      border: 1px solid rgba(255,215,200,0.5);
      transition: 0.3s;
    }
    .search-wrapper input::placeholder {
      color: #ffe7d4;
      font-weight: 300;
    }
    .search-wrapper input:focus {
      outline: none;
      width: 260px;
      background: rgba(255,235,220,0.3);
      border-color: #fbc1b1;
    }
    .search-wrapper i {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      color: #ffd4be;
      pointer-events: none;
    }

    /* ----- HERO BANNER (portfolio of treznor) ----- */
    .hero {
      text-align: center;
      padding: 5rem 1rem 4rem;
      animation: fadeGlow 1.8s ease-out;
    }
    @keyframes fadeGlow {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .hero h2 {
      font-size: 5rem;
      font-weight: 700;
      background: linear-gradient(145deg, #ffecd2, #fcd6c4, #f5b9d0, #d9a7d3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 60px #c09ab6;
      letter-spacing: -2px;
      line-height: 1.1;
    }
    .hero h2 small {
      font-size: 2rem;
      display: block;
      font-weight: 300;
      letter-spacing: 6px;
      color: #ffded7;
      -webkit-text-fill-color: #ffe3cf;
      text-shadow: 0 0 20px #b591a5;
    }
    .hero p {
      font-size: 1.4rem;
      max-width: 700px;
      margin: 1.5rem auto 0;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(8px);
      padding: 0.8rem 2rem;
      border-radius: 60px;
      border: 1px solid rgba(255,215,200,0.5);
      display: inline-block;
      color: #fff5e7;
    }

    /* ----- PRODUCT GRID (with 3D images) ----- */
    .section-title {
      text-align: center;
      font-size: 2.5rem;
      margin: 2.5rem 0 1.5rem;
      font-weight: 400;
      background: linear-gradient(135deg, #fff3e2, #fcddc8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 25px #caa0b5;
    }
    .product-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      padding: 1rem 2rem 3rem;
      max-width: 1300px;
      margin: 0 auto;
    }
    .product-card {
      width: 260px;
      background: rgba(30, 20, 35, 0.3);
      backdrop-filter: blur(18px);
      border-radius: 40px;
      padding: 1.8rem 1.2rem 1.5rem;
      border: 1px solid rgba(255, 210, 200, 0.4);
      box-shadow: 0 30px 40px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(245, 175, 200, 0.2) inset;
      transition: 0.25s ease;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }
    .product-card:hover {
      transform: translateY(-10px) scale(1.02);
      border-color: #ffbcb5;
      box-shadow: 0 40px 50px -15px #472f4b;
    }
    /* 3D image container (simple rotating element) */
    .img-3d {
      width: 150px;
      height: 150px;
      margin: 0 auto 1rem;
      background: radial-gradient(circle at 30% 30%, #ffdba5, #cc8fae);
      border-radius: 50% 30% 50% 30% / 40% 50% 40% 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      box-shadow: 0 20px 30px -5px #4f3866, 0 0 40px #f7cfb0 inset;
      animation: float3d 6s infinite alternate ease-in-out;
      transform-style: preserve-3d;
      color: #ffe6d5;
      border: 2px solid rgba(255, 230, 200, 0.7);
    }
    @keyframes float3d {
      0% { border-radius: 50% 30% 50% 30% / 40% 50% 40% 50%; transform: rotateY(0deg) rotateX(5deg); }
      100% { border-radius: 40% 50% 30% 60% / 50% 40% 60% 30%; transform: rotateY(20deg) rotateX(15deg) scale(1.03); }
    }
    .product-card h3 {
      font-size: 1.7rem;
      font-weight: 500;
      margin: 0.5rem 0 0.2rem;
      color: #fff1e2;
    }
    .price {
      font-size: 1.7rem;
      font-weight: 600;
      background: linear-gradient(135deg, #ffe2ba, #ffc9cf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0.4rem 0;
    }
    .btn-add {
      background: rgba(255, 235, 215, 0.25);
      backdrop-filter: blur(8px);
      border: 1.5px solid #fbcbbb;
      color: white;
      padding: 0.6rem 1.8rem;
      border-radius: 60px;
      font-weight: 500;
      font-size: 1rem;
      margin-top: 1rem;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
    }
    .btn-add:hover {
      background: rgba(255, 210, 190, 0.45);
      border-color: #ffb0a5;
      transform: scale(1.02);
      box-shadow: 0 5px 15px #a35474;
    }

    /* ----- PRODUCT PAGE (modal / detail view) ----- */
    .product-page-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }
    .product-page-card {
      width: 90%;
      max-width: 1000px;
      background: rgba(25, 15, 30, 0.7);
      backdrop-filter: blur(25px);
      border-radius: 60px;
      padding: 2.5rem;
      border: 2px solid rgba(255, 210, 190, 0.6);
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      color: white;
      position: relative;
    }
    .close-page {
      position: absolute;
      top: 25px; right: 35px;
      font-size: 2.5rem;
      cursor: pointer;
      color: #ffcfc2;
    }
    .product-3d-preview {
      flex: 1 1 250px;
      min-width: 250px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .big-3d {
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, #ffc9af, #a87996);
      border-radius: 40% 60% 40% 60% / 50% 40% 60% 50%;
      animation: float3d 8s infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      box-shadow: 0 30px 40px #3d2645;
    }
    .product-details {
      flex: 2 1 300px;
    }
    .product-details h2 {
      font-size: 3rem;
      background: linear-gradient(135deg, #ffebd2, #fbd1c7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .product-details .desc {
      font-size: 1.2rem;
      margin: 1.5rem 0;
      line-height: 1.5;
      opacity: 0.9;
    }
    .product-details .price-big {
      font-size: 2.8rem;
      font-weight: 700;
      color: #ffeac0;
    }
    .btn-checkout-now {
      background: #be8fa7;
      border: none;
      color: white;
      padding: 1rem 3rem;
      border-radius: 40px;
      font-size: 1.4rem;
      margin: 1.5rem 0;
      cursor: pointer;
      border: 1px solid #ffbfb0;
      box-shadow: 0 10px 25px #5d3a53;
    }

    /* ----- CART SIDEBAR (working) ----- */
    .cart-sidebar {
      position: fixed;
      top: 0; right: -450px;
      width: 380px;
      height: 100%;
      background: rgba(30, 15, 30, 0.7);
      backdrop-filter: blur(30px);
      border-left: 2px solid rgba(255, 200, 180, 0.6);
      box-shadow: -10px 0 40px black;
      z-index: 300;
      transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      padding: 2rem 1.5rem;
      color: #fff1e6;
      display: flex;
      flex-direction: column;
    }
    .cart-sidebar.open {
      right: 0;
    }
    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 2rem;
      border-bottom: 1px solid #fecfbb;
      padding-bottom: 1rem;
    }
    .cart-header i {
      cursor: pointer;
      color: #fbc9bb;
    }
    .cart-items {
      flex: 1;
      overflow-y: auto;
      margin: 1.5rem 0;
    }
    .cart-item {
      display: flex;
      gap: 1rem;
      background: rgba(255,240,230,0.1);
      border-radius: 30px;
      padding: 0.8rem;
      margin-bottom: 1rem;
      align-items: center;
    }
    .cart-item-img {
      width: 60px; height: 60px;
      background: #dbb6c2;
      border-radius: 30% 50% 30% 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .cart-item-details {
      flex: 1;
    }
    .cart-item-title {
      font-weight: 600;
    }
    .cart-item-price {
      color: #ffddbb;
    }
    .cart-remove {
      color: #ffaaa0;
      cursor: pointer;
      font-size: 1.3rem;
    }
    .cart-total {
      font-size: 2rem;
      font-weight: 600;
      border-top: 1px solid #e3bcb5;
      padding: 1rem 0;
    }
    .btn-checkout {
      background: #a57c9c;
      border: none;
      color: white;
      padding: 1.2rem;
      border-radius: 50px;
      font-size: 1.5rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #ffcebb;
      box-shadow: 0 5px 20px #634a61;
      transition: 0.2s;
    }
    .btn-checkout:hover {
      background: #c097b6;
    }

    /* Footer */
    footer {
      margin-top: auto;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(12px);
      padding: 2rem;
      text-align: center;
      border-top: 1px solid rgba(255,200,180,0.5);
      font-size: 1.1rem;
      color: #ffe9df;
    }

    /* buttons general */
    .checkout-btn-footer {
      background: #b38b9e;
      border: none;
      color: white;
      padding: 0.5rem 2rem;
      border-radius: 30px;
      font-size: 1.3rem;
      margin-left: 2rem;
      border: 1px solid #ffcfc4;
      cursor: pointer;
    }

    /* responsive */
    @media (max-width: 700px) {
      .hero h2 { font-size: 3.5rem; }
      header { flex-direction: column; gap: 1rem; }
    }
  </style>
</head>
<body>
  <div class="venus-bg"></div>
  <canvas id="three-canvas"></canvas>

  <div class="site-wrapper">
    <header>
      <div class="logo">
        <h1>QIZIN <span>by treznor</span></h1>
      </div>
      <div class="nav-icons">
        <div class="search-wrapper">
          <input type="text" placeholder="Search..." id="searchInput">
          <i class="fas fa-search"></i>
        </div>
        <i class="fas fa-shopping-bag" id="cartIcon"></i>
      </div>
    </header>

    <!-- Hero banner -->
    <div class="hero">
      <h2>PORTFOLIO <small>OF TREZNOR</small></h2>
      <p>✦ 3D venus collection ✦ limited drops</p>
    </div>

    <!-- Products grid (3D images) -->
    <div class="section-title">/ trending now</div>
    <div class="product-grid" id="productGrid">
      <!-- dynamically populated from js, but static fallback included for clarity -->
    </div>

    <!-- Footer with checkout button -->
    <footer>
      <span>© 2025 QIZIN — venus gradient / all rights reserved </span>
      <button class="checkout-btn-footer" id="footerCheckout">CHECKOUT →</button>
    </footer>
  </div>

  <!-- Cart Sidebar -->
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <span>your cart</span>
      <i class="fas fa-times" id="closeCart"></i>
    </div>
    <div class="cart-items" id="cartItems">
      <!-- dynamic cart -->
    </div>
    <div class="cart-total" id="cartTotal">Total: ₹0</div>
    <button class="btn-checkout" id="checkoutBtn">PROCEED</button>
  </div>

  <!-- Product Page Modal -->
  <div class="product-page-overlay" id="productPageOverlay">
    <div class="product-page-card">
      <i class="fas fa-times close-page" id="closeProductPage"></i>
      <div class="product-3d-preview">
        <div class="big-3d" id="productPageImg">🪐</div>
      </div>
      <div class="product-details" id="productPageDetails">
        <h2 id="pageTitle">Venus Ring</h2>
        <div class="desc" id="pageDesc">handcrafted 3D glow with venus gradient.</div>
        <div class="price-big" id="pagePrice">₹129</div>
        <button class="btn-checkout-now" id="addFromPage">Add to cart</button>
      </div>
    </div>
  </div>

  <!-- Three.js library and simple 3D background -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    // -------------------- 3D BACKGROUND (smooth, venus colored) --------------------
    import * as THREE from 'three';

    const canvas = document.getElementById('three-canvas');
    const scene = new THREE.Scene();
    scene.background = null; // transparent to show venus gradient

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1, 12);

    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

    // lights
    const light = new THREE.AmbientLight(0x404060);
    scene.add(light);
    const pointLight = new THREE.PointLight(0xffaa88, 1, 20);
    pointLight.position.set(2, 5, 5);
    scene.add(pointLight);

    // floating venus-like geometry (soft particles)
    const particlesGeo = new THREE.BufferGeometry();
    const count = 1500;
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      const r = 6 + Math.random() * 8;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
      positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta) * 0.7;
      positions[i*3+2] = r * Math.cos(phi);
      
      // venus gradient colors: peach, rose, lavender
      const col = new THREE.Color().setHSL(0.05 + Math.random()*0.15, 0.7, 0.7 + Math.random()*0.2);
      colors[i*3] = col.r;
      colors[i*3+1] = col.g;
      colors[i*3+2] = col.b;
    }
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    particlesGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const particlesMat = new THREE.PointsMaterial({ size: 0.18, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
    const particles = new THREE.Points(particlesGeo, particlesMat);
    scene.add(particles);

    // rotating centerpiece (subtle)
    const torusKnotGeo = new THREE.TorusKnotGeometry(0.9, 0.25, 128, 16);
    const torusKnotMat = new THREE.MeshPhongMaterial({ color: 0xffaa99, emissive: 0x552244, wireframe: true, transparent: true, opacity: 0.2 });
    const knot = new THREE.Mesh(torusKnotGeo, torusKnotMat);
    scene.add(knot);

    function animate() {
      requestAnimationFrame(animate);
      particles.rotation.y += 0.0002;
      particles.rotation.x += 0.0001;
      knot.rotation.x += 0.002;
      knot.rotation.y += 0.003;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // -------------------- UI & CART (fully interactive) --------------------
    // product data (with 3D image emoji)
    const products = [
      { id: 1, name: 'VENUS RING', price: 129, emoji: '💍', desc: '3D ceramic, venus gradient finish.' },
      { id: 2, name: 'NEBULA PENDANT', price: 199, emoji: '🌙', desc: 'Glowing moonstone & aurora chain.' },
      { id: 3, name: 'MAGMA CUFF', price: 259, emoji: '🔥', desc: 'Brushed titanium with venus flare.' },
      { id: 4, name: 'ORBIT EARRINGS', price: 349, emoji: '🪐', desc: 'levitating spheres, gradient anodized.' }
    ];

    let cart = [];

    // render products
    const grid = document.getElementById('productGrid');
    function renderProducts() {
      grid.innerHTML = '';
      products.forEach(p => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.dataset.id = p.id;
        card.innerHTML = `
          <div class="img-3d">${p.emoji}</div>
          <h3>${p.name}</h3>
          <div class="price">₹${p.price}</div>
          <button class="btn-add" data-id="${p.id}">add to cart</button>
        `;
        card.querySelector('.btn-add').addEventListener('click', (e) => {
          e.stopPropagation();
          addToCart(p.id);
        });
        card.addEventListener('click', () => openProductPage(p.id));
        grid.appendChild(card);
      });
    }
    renderProducts();

    // cart functions
    function addToCart(id) {
      const prod = products.find(p => p.id === id);
      if (!prod) return;
      const existing = cart.find(item => item.id === id);
      if (existing) existing.quantity++;
      else cart.push({ ...prod, quantity: 1 });
      updateCartSidebar();
      openCart(); // optional open cart when adding
    }

    function removeFromCart(id) {
      cart = cart.filter(item => item.id !== id);
      updateCartSidebar();
    }

    function updateCartSidebar() {
      const container = document.getElementById('cartItems');
      const totalSpan = document.getElementById('cartTotal');
      let html = '';
      let total = 0;
      cart.forEach(item => {
        total += item.price * item.quantity;
        html += `
          <div class="cart-item">
            <div class="cart-item-img">${item.emoji}</div>
            <div class="cart-item-details">
              <div class="cart-item-title">${item.name} x${item.quantity}</div>
              <div class="cart-item-price">₹${item.price * item.quantity}</div>
            </div>
            <i class="fas fa-trash cart-remove" data-id="${item.id}"></i>
          </div>
        `;
      });
      container.innerHTML = html || '<p style="opacity:0.6;">cart is empty</p>';
      totalSpan.innerText = `Total: ₹${total}`;
      // attach remove events
      container.querySelectorAll('.cart-remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(e.target.dataset.id);
          removeFromCart(id);
        });
      });
    }

    // sidebar controls
    const cartSidebar = document.getElementById('cartSidebar');
    const cartIcon = document.getElementById('cartIcon');
    const closeCart = document.getElementById('closeCart');
    function openCart() { cartSidebar.classList.add('open'); }
    function closeCartFn() { cartSidebar.classList.remove('open'); }
    cartIcon.addEventListener('click', openCart);
    closeCart.addEventListener('click', closeCartFn);

    // product page
    const productOverlay = document.getElementById('productPageOverlay');
    const closePage = document.getElementById('closeProductPage');
    const pageTitle = document.getElementById('pageTitle');
    const pageDesc = document.getElementById('pageDesc');
    const pagePrice = document.getElementById('pagePrice');
    const pageImg = document.getElementById('productPageImg');
    const addFromPage = document.getElementById('addFromPage');
    let currentProduct = null;

    function openProductPage(id) {
      const prod = products.find(p => p.id === id);
      if (!prod) return;
      currentProduct = prod;
      pageTitle.innerText = prod.name;
      pageDesc.innerText = prod.desc;
      pagePrice.innerText = `₹${prod.price}`;
      pageImg.innerText = prod.emoji;
      productOverlay.style.display = 'flex';
    }

    closePage.addEventListener('click', () => productOverlay.style.display = 'none');
    productOverlay.addEventListener('click', (e) => {
      if (e.target === productOverlay) productOverlay.style.display = 'none';
    });

    addFromPage.addEventListener('click', () => {
      if (currentProduct) {
        addToCart(currentProduct.id);
        productOverlay.style.display = 'none';
      }
    });

    // search button working (filter)
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll('.product-card').forEach(card => {
        const name = card.querySelector('h3').innerText.toLowerCase();
        card.style.display = name.includes(term) ? 'flex' : 'none';
      });
    });

    // footer checkout & checkout btn
    document.getElementById('footerCheckout').addEventListener('click', () => {
      alert('Checkout simulation — total: ₹' + cart.reduce((s, i) => s + i.price * i.quantity, 0));
    });
    document.getElementById('checkoutBtn').addEventListener('click', () => {
      alert('Checkout simulation — total: ₹' + cart.reduce((s, i) => s + i.price * i.quantity, 0));
    });

    // initial update
    updateCartSidebar();

    // (optional) make all buttons working: also any .btn-checkout-now etc.
  </script>
  <!-- ensure cart update also on remove -->
</body>
</html>
